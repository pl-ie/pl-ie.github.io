<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Disable Cloudflare email obfuscation for this page -->
  <meta name="cf-2fa-verify" content="skip">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practical Linux | pl.ie</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

    :root {
      --green:   #00ff41;
      --green2:  #00cc33;
      --dim:     #006614;
      --bg:      #0a0a0a;
      --bg2:     #0f0f0f;
      --border:  #1a3a1a;
      --gray:    #3a3a3a;
      --white:   #e0e0e0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      padding: 2rem 1rem;
      /* scanline effect */
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
    }

    /* ── CRT flicker on load ── */
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92%      { opacity: 1; }
      93%      { opacity: 0.6; }
      94%      { opacity: 1; }
      96%      { opacity: 0.8; }
      97%      { opacity: 1; }
    }
    body { animation: flicker 8s infinite; }

    /* ── Layout ── */
    .terminal {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .prompt {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--green);
      text-shadow: 0 0 12px var(--green2);
    }
    .prompt span { color: var(--dim); }

    .tagline {
      margin-top: 0.5rem;
      color: var(--white);
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .distros {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.1em;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.8rem 0;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .section-label::before { content: "# "; color: var(--green2); }

    /* ── Menu: categories ── */
    .category {
      margin-bottom: 2rem;
    }

    .category-title {
      font-size: 0.72rem;
      color: var(--green2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .category-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Script cards ── */
    .scripts {
      display: grid;
      gap: 0.5rem;
    }

    .script-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      text-decoration: none;
      display: grid;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: rgba(0,255,65,0.15);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    .script-item::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--green);
      transform: scaleY(0);
      transition: transform 0.15s;
      transform-origin: bottom;
    }
    .script-item:hover {
      border-color: var(--green2);
      background: #111;
    }
    .script-item:hover::before { transform: scaleY(1); }

    .script-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
    }

    .script-desc {
      font-size: 0.75rem;
      color: #ffff00;
      font-weight: 700;
      opacity: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .script-tag {
      font-size: 0.65rem;
      color: var(--dim);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
    }

    /* ── Submenu (expandable) ── */
    .submenu {
      display: none;
      border: 1px solid var(--border);
      border-top: none;
      background: #0c0c0c;
      padding: 1rem 1rem 0.8rem 1rem;
      font-size: 0.78rem;
    }
    .submenu.open { display: block; }

    .submenu-row {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
      margin-bottom: 0.35rem;
      color: var(--white);
      opacity: 0.65;
    }
    .submenu-row .key {
      color: var(--green2);
      min-width: 1.8rem;
      font-size: 0.7rem;
    }

    .submenu-links {
      margin-top: 0.8rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .submenu-links a {
      font-size: 0.72rem;
      color: var(--green);
      text-decoration: none;
      display: grid;
      opacity: 0.8;
      border-bottom: 1px dashed var(--dim);
      padding-bottom: 1px;
    }
    .submenu-links a:hover { opacity: 1; border-color: var(--green); }

    .install-block {
      margin-top: 0.9rem;
      background: #080808;
      border: 1px solid var(--border);
      padding: 0.6rem 0.8rem;
      font-size: 0.72rem;
      color: var(--green2);
      position: relative;
      cursor: pointer;
    }
    .install-block .copy-hint {
      position: absolute;
      right: 0.6rem; top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      color: var(--dim);
    }
    .install-block:hover .copy-hint { color: var(--green); }
    .install-block.copied .copy-hint::after { content: " ✓ copied"; color: var(--green); }

    /* ── Footer ── */
    .footer {
      margin-top: 3rem;
      font-size: 0.65rem;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ── Cursor blink ── */
    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Fade-in on load ── */
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .terminal > * { animation: fadein 0.4s ease both; }
    .terminal > *:nth-child(1) { animation-delay: 0.05s; }
    .terminal > *:nth-child(2) { animation-delay: 0.15s; }
    .terminal > *:nth-child(3) { animation-delay: 0.25s; }
    .terminal > *:nth-child(4) { animation-delay: 0.35s; }
    .terminal > *:nth-child(5) { animation-delay: 0.45s; }

    @media (max-width: 520px) {
      .script-desc { font-size: 0.65rem; }
      .script-item { grid-template-columns: auto 1fr; }
      .script-tag  { display: none; }
    }
  </style>
</head>
<body>
<div class="terminal">

  <!-- Header / business card -->
  <div class="prompt">root&#64;pl.ie:~#<span class="cursor"></span> ;-)</div>
  <p class="tagline">Linux notes, configurations, and scripts.</p>
  <p class="distros">Ubuntu · Debian · Fedora · Termux</p>

  <hr class="divider" />

  <!-- Scripts menu -->
  <p class="section-label">scripts</p>

  <!-- Category: Media -->
  <div class="category">
    <div class="category-title">media</div>
    <div class="scripts">

      <!-- mpl -->
      <a class="script-item" href="https://raw.githubusercontent.com/pl-ie/pl-ie.github.io/main/mpl" target="_blank">
        <span class="script-name">mpl</span>
        <span class="script-desc">Media Playlist Player</span>
        <span class="script-tag">bash</span>
      </a>

      <!-- mtp -->
      <a class="script-item" href="https://raw.githubusercontent.com/pl-ie/pl-ie.github.io/main/mtp" target="_blank">
        <span class="script-name">mtp</span>
        <span class="script-desc">Media Tail Parts</span>
        <span class="script-tag">bash</span>
      </a>

      <!-- opus -->
      <a class="script-item" href="https://raw.githubusercontent.com/pl-ie/pl-ie.github.io/main/opus" target="_blank">
        <span class="script-name">opus</span>
        <span class="script-desc">Covert all to opus</span>
        <span class="script-tag">bash</span>
      </a>

    </div>
  </div><!-- /category media -->

  <!-- Placeholder for future categories — just uncomment and fill -->
  <!--
  <div class="category">
    <div class="category-title">network</div>
    <div class="scripts">
      <div class="script-item" onclick="toggleSubmenu('example')">
        <span class="script-name">example</span>
        <span class="script-desc">Description here</span>
        <span class="script-tag">bash</span>
      </div>
      <div class="submenu" id="sub-example">
        ...
      </div>
    </div>
  </div>
  -->

  <hr class="divider" />

  <div class="footer">
    <a href="https://github.com/pl-ie/pl-ie.github.io" style="color:var(--dim);text-decoration:none;" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--dim)'">pl.ie — practical linux</a>
    <a href="https://github.com/pl-ie" style="color:var(--dim);text-decoration:none;" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--dim)'">github.com/pl-ie</a>
  </div>

</div>
</body>
</html>
